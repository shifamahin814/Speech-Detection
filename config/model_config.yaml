# Model Configuration

model:
  type: CNN
  input_shape: [64, 64, 3]
  num_classes: 10
  layers:
    - type: Conv2D
      filters: 32
      kernel_size: 3
      activation: relu
    - type: MaxPooling2D
      pool_size: 2
    - type: Flatten
    - type: Dense
      units: 128
      activation: relu
    - type: Dense
      units: num_classes
      activation: softmax